name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: chatgpt
    steps:
      - uses: actions/checkout@v4

      - name: Set version from git tag
        working-directory: .
        run: node scripts/sync-versions.mjs "${{ github.ref_name }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: chatgpt/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm (with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  release-python-tag-only:
    runs-on: ubuntu-latest
    needs: release-npm
    steps:
      - uses: actions/checkout@v4
      - name: Version synced in repo
        run: |
          echo "npm publish completed; pyproject.toml / server.json aligned via sync-versions.mjs on tag."
